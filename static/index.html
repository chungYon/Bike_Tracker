<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark-mode">
    <div class="background-glass"></div>
    
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-bicycle"></i>
            <span>BikeTracker</span>
        </div>
        <div class="nav-links">
            <a href="#" id="nav-home" class="active">Dashboard</a>
        </div>
    </nav>

    <main class="container">
        <!-- Dashboard View -->
        <div id="dashboard-view">
            <div class="dashboard-header">
                <div class="streak-card glass-card">
                    <div class="streak-icon">🔥</div>
                    <div class="streak-info">
                        <h3>Current Streak</h3>
                        <p class="streak-count" id="streak-counter">...</p>
                        <span class="streak-sub">Weeks in a row</span>
                    </div>
                </div>
                
                <div class="news-card glass-card">
                    <h3><i class="fa-solid fa-newspaper"></i> Cycling News</h3>
                    <ul id="news-list" class="news-list">
                        <!-- News items rendered here -->
                    </ul>
                </div>
            </div>

            <div class="calendar-card glass-card">
                <h3><i class="fa-regular fa-calendar-days"></i> Riding Calendar</h3>
                <div class="calendar-controls">
                    <button id="prev-year" title="Previous Year"><i class="fa-solid fa-angles-left"></i></button>
                    <button id="prev-month" title="Previous Month"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="current-month-display"></span>
                    <button id="next-month" title="Next Month"><i class="fa-solid fa-chevron-right"></i></button>
                    <button id="next-year" title="Next Year"><i class="fa-solid fa-angles-right"></i></button>
                </div>
                <div class="calendar-grid">
                    <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div><div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
                    <!-- Days generated here -->
                </div>
            </div>
        </div>

        <!-- Analysis View -->
        <div id="analysis-view" class="hidden">
            <button id="back-btn" class="glass-btn"><i class="fa-solid fa-arrow-left"></i> Back to Calendar</button>
            <!-- Activity cards are dynamically injected here -->
            <div id="activities-container"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Use a simple GPX parser for Leaflet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
